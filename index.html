<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
    <title>Quiz Game</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="screen active" id="start-screen">
            <h1>Quiz Time!</h1>
            <p>Test Your Knowledge with these fun Question</p>
            <button id="start-btn">
                Start Quiz
            </button>
        </div>

        <div class="screen" id="Quize-screen">
            <div class="quiz-header">
                <h2 id="Question-text"> Question Goes Here...

                </h2>
                <div class="quiz-info">
                    <p>
                        Question <span id="current-question">1</span> of <span id="question.length">5</span>

                    </p>
                    <p>
                        Score: <span id="score">0</span>
                    </p>
                </div>
            </div>
            <div class="answer-container" id="answer-container">
                <!-- anwer buttons will be inserted here from our js code later at some time  ..... -->
            </div>
            <div class="progress-bar">
                <div class="progress" id="progree">

                </div>
            </div>
            
        </div>
        <div id="result-screen"class="screen">
            <h1>Quiz Results</h1>
            <div class="result-info">
                <p>You scored <span id="final-score">0</span>out of <span id="max-score">5</span></p>
                <div class="result-message">Good Job!</div>
            </div>

            <button id="restart-btn">Restart Quiz</button>

        </div>

    </div>

</body>
<script src="script.js"></script>

</html>
